name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PLATFORM: linux/amd64
  DOCKER_NETWORK: BODELINK_NETWORK
  API_CONTAINER_NAME: eselink-api
  WEB_CONTAINER_NAME: eselink-web
  API_CONTAINER_IP: 192.169.4.26
  WEB_CONTAINER_IP: 192.169.4.27
  API_PORT: 4006
  WEB_PORT: 3002

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate build configuration
        run: |
          missing=0

          require_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "Missing secret: $name"
              missing=1
            fi
          }

          require_var() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "Missing variable: $name"
              missing=1
            fi
          }

          require_secret "DOCKER_USERNAME" "${{ secrets.DOCKER_USERNAME }}"
          require_secret "DOCKER_PASSWORD" "${{ secrets.DOCKER_PASSWORD }}"
          require_secret "DB_PASSWORD" "${{ secrets.DB_PASSWORD }}"
          require_secret "REDIS_PASSWORD" "${{ secrets.REDIS_PASSWORD }}"
          require_secret "JWT_ACCESS_SECRET" "${{ secrets.JWT_ACCESS_SECRET }}"
          require_secret "JWT_REFRESH_SECRET" "${{ secrets.JWT_REFRESH_SECRET }}"
          require_secret "MELI_CLIENT_ID" "${{ secrets.MELI_CLIENT_ID }}"
          require_secret "MELI_CLIENT_SECRET" "${{ secrets.MELI_CLIENT_SECRET }}"

          require_var "DB_HOST" "${{ vars.DB_HOST }}"
          require_var "DB_PORT" "${{ vars.DB_PORT }}"
          require_var "DB_DATABASE" "${{ vars.DB_DATABASE }}"
          require_var "DB_USERNAME" "${{ vars.DB_USERNAME }}"
          require_var "REDIS_HOST" "${{ vars.REDIS_HOST }}"
          require_var "REDIS_PORT" "${{ vars.REDIS_PORT }}"
          require_var "REDIS_DB" "${{ vars.REDIS_DB }}"
          require_var "NEXT_PUBLIC_API_URL" "${{ vars.NEXT_PUBLIC_API_URL }}"

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract API metadata
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/eselink-api
          tags: |
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}
          build-args: |
            DB_HOST=${{ vars.DB_HOST }}
            DB_PORT=${{ vars.DB_PORT }}
            DB_DATABASE=${{ vars.DB_DATABASE }}
            DB_USERNAME=${{ vars.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_SSL=${{ vars.DB_SSL || 'false' }}
            REDIS_HOST=${{ vars.REDIS_HOST }}
            REDIS_PORT=${{ vars.REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            REDIS_DB=${{ vars.REDIS_DB }}
            PORT=4006
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_ACCESS_TTL=${{ vars.JWT_ACCESS_TTL || '15m' }}
            JWT_REFRESH_TTL=${{ vars.JWT_REFRESH_TTL || '7d' }}
            MELI_CLIENT_ID=${{ secrets.MELI_CLIENT_ID }}
            MELI_CLIENT_SECRET=${{ secrets.MELI_CLIENT_SECRET }}
            MELI_REDIRECT_URI=${{ vars.MELI_REDIRECT_URI || 'https://eselink-web-qa.bodelink.com/api/account-connections/mercadolibre/oauth/callback' }}
            MELI_API_BASE_URL=${{ vars.MELI_API_BASE_URL || 'https://api.mercadolibre.com' }}
            MELI_AUTH_BASE_URL=${{ vars.MELI_AUTH_BASE_URL || 'https://auth.mercadolibre.com' }}
            WEB_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://eselink-web-qa.bodelink.com' }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://eselink-web-qa.bodelink.com' }}
            APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://eselink-web-qa.bodelink.com' }}
            FRONTEND_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://eselink-web-qa.bodelink.com' }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

      - name: Extract Web metadata
        id: meta_web
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/eselink-web
          tags: |
            type=raw,value=latest

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://eselink-web-qa.bodelink.com' }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_QA_ZERVO }}

      - name: Validate deploy configuration
        run: |
          missing=0

          require_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "Missing secret: $name"
              missing=1
            fi
          }

          require_secret "SSH_HOST_QA_ZERVO" "${{ secrets.SSH_HOST_QA_ZERVO }}"
          require_secret "SSH_PORT_QA_ZERVO" "${{ secrets.SSH_PORT_QA_ZERVO }}"
          require_secret "SSH_USER_QA_ZERVO" "${{ secrets.SSH_USER_QA_ZERVO }}"
          require_secret "SSH_PRIVATE_KEY_QA_ZERVO" "${{ secrets.SSH_PRIVATE_KEY_QA_ZERVO }}"
          require_secret "DOCKER_USERNAME" "${{ secrets.DOCKER_USERNAME }}"
          require_secret "DOCKER_PASSWORD" "${{ secrets.DOCKER_PASSWORD }}"
          require_secret "DB_PASSWORD" "${{ secrets.DB_PASSWORD }}"
          require_secret "REDIS_PASSWORD" "${{ secrets.REDIS_PASSWORD }}"
          require_secret "JWT_ACCESS_SECRET" "${{ secrets.JWT_ACCESS_SECRET }}"
          require_secret "JWT_REFRESH_SECRET" "${{ secrets.JWT_REFRESH_SECRET }}"
          require_secret "MELI_CLIENT_ID" "${{ secrets.MELI_CLIENT_ID }}"
          require_secret "MELI_CLIENT_SECRET" "${{ secrets.MELI_CLIENT_SECRET }}"

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H -p ${{ secrets.SSH_PORT_QA_ZERVO }} ${{ secrets.SSH_HOST_QA_ZERVO }} >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy API and Web to server
        run: |
          ssh -p ${{ secrets.SSH_PORT_QA_ZERVO }} ${{ secrets.SSH_USER_QA_ZERVO }}@${{ secrets.SSH_HOST_QA_ZERVO }} << 'EOF'
            set -e

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker pull ${{ secrets.DOCKER_USERNAME }}/eselink-api:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/eselink-web:latest

            if ! docker network inspect ${{ env.DOCKER_NETWORK }} >/dev/null 2>&1; then
              docker network create \
                --driver bridge \
                --subnet 192.169.4.0/24 \
                ${{ env.DOCKER_NETWORK }}
            fi

            if [ "$(docker ps -aq -f name=${{ env.API_CONTAINER_NAME }})" ]; then
              docker stop ${{ env.API_CONTAINER_NAME }} || true
              docker rm ${{ env.API_CONTAINER_NAME }} || true
            fi

            if [ "$(docker ps -aq -f name=${{ env.WEB_CONTAINER_NAME }})" ]; then
              docker stop ${{ env.WEB_CONTAINER_NAME }} || true
              docker rm ${{ env.WEB_CONTAINER_NAME }} || true
            fi

            docker run -d \
              --name ${{ env.API_CONTAINER_NAME }} \
              --restart unless-stopped \
              --network ${{ env.DOCKER_NETWORK }} \
              --ip ${{ env.API_CONTAINER_IP }} \
              -p ${{ env.API_PORT }}:${{ env.API_PORT }} \
              --security-opt no-new-privileges:true \
              --read-only \
              --tmpfs /tmp \
              --tmpfs /var/tmp \
              --cap-drop ALL \
              --cap-add NET_BIND_SERVICE \
              -e DB_HOST='${{ vars.DB_HOST }}' \
              -e DB_PORT='${{ vars.DB_PORT }}' \
              -e DB_DATABASE='${{ vars.DB_DATABASE }}' \
              -e DB_USERNAME='${{ vars.DB_USERNAME }}' \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e DB_SSL='${{ vars.DB_SSL || 'false' }}' \
              -e REDIS_HOST='${{ vars.REDIS_HOST }}' \
              -e REDIS_PORT='${{ vars.REDIS_PORT }}' \
              -e REDIS_PASSWORD='${{ secrets.REDIS_PASSWORD }}' \
              -e REDIS_DB='${{ vars.REDIS_DB }}' \
              -e PORT='4006' \
              -e JWT_ACCESS_SECRET='${{ secrets.JWT_ACCESS_SECRET }}' \
              -e JWT_REFRESH_SECRET='${{ secrets.JWT_REFRESH_SECRET }}' \
              -e JWT_ACCESS_TTL='${{ vars.JWT_ACCESS_TTL || '15m' }}' \
              -e JWT_REFRESH_TTL='${{ vars.JWT_REFRESH_TTL || '7d' }}' \
              -e MELI_CLIENT_ID='${{ secrets.MELI_CLIENT_ID }}' \
              -e MELI_CLIENT_SECRET='${{ secrets.MELI_CLIENT_SECRET }}' \
              -e MELI_REDIRECT_URI='${{ vars.MELI_REDIRECT_URI || 'https://eselink-web-qa.bodelink.com/api/account-connections/mercadolibre/oauth/callback' }}' \
              -e MELI_API_BASE_URL='${{ vars.MELI_API_BASE_URL || 'https://api.mercadolibre.com' }}' \
              -e MELI_AUTH_BASE_URL='${{ vars.MELI_AUTH_BASE_URL || 'https://auth.mercadolibre.com' }}' \
              -e WEB_APP_URL='${{ vars.NEXT_PUBLIC_APP_URL || 'https://eselink-web-qa.bodelink.com' }}' \
              -e NEXT_PUBLIC_APP_URL='${{ vars.NEXT_PUBLIC_APP_URL || 'https://eselink-web-qa.bodelink.com' }}' \
              -e APP_URL='${{ vars.NEXT_PUBLIC_APP_URL || 'https://eselink-web-qa.bodelink.com' }}' \
              -e FRONTEND_URL='${{ vars.NEXT_PUBLIC_APP_URL || 'https://eselink-web-qa.bodelink.com' }}' \
              -e NEXT_PUBLIC_API_URL='${{ vars.NEXT_PUBLIC_API_URL }}' \
              -e OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}' \
              --health-cmd 'node -e "require(\"http\").get(\"http://localhost:4006/api/health\", (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"' \
              --health-interval 30s \
              --health-timeout 10s \
              --health-retries 3 \
              --health-start-period 40s \
              ${{ secrets.DOCKER_USERNAME }}/eselink-api:latest

            docker run -d \
              --name ${{ env.WEB_CONTAINER_NAME }} \
              --restart unless-stopped \
              --network ${{ env.DOCKER_NETWORK }} \
              --ip ${{ env.WEB_CONTAINER_IP }} \
              -p ${{ env.WEB_PORT }}:${{ env.WEB_PORT }} \
              --security-opt no-new-privileges:true \
              --read-only \
              --tmpfs /tmp \
              --tmpfs /var/tmp \
              --cap-drop ALL \
              --cap-add NET_BIND_SERVICE \
              -e PORT='3002' \
              -e HOSTNAME='0.0.0.0' \
              -e NEXT_PUBLIC_API_URL='${{ vars.NEXT_PUBLIC_API_URL }}' \
              -e NEXT_PUBLIC_APP_URL='${{ vars.NEXT_PUBLIC_APP_URL || 'https://eselink-web-qa.bodelink.com' }}' \
              --health-cmd 'node -e "require(\"http\").get(\"http://localhost:3002\", (r) => {process.exit(r.statusCode < 500 ? 0 : 1)})"' \
              --health-interval 30s \
              --health-timeout 10s \
              --health-retries 3 \
              --health-start-period 40s \
              ${{ secrets.DOCKER_USERNAME }}/eselink-web:latest

            if ! docker image prune -f; then
              echo "docker prune en ejecucion, se omite en este deploy"
            fi

            docker ps -a | grep -E '${{ env.API_CONTAINER_NAME }}|${{ env.WEB_CONTAINER_NAME }}'
          EOF

      - name: Verify deployment
        run: |
          ssh -p ${{ secrets.SSH_PORT_QA_ZERVO }} ${{ secrets.SSH_USER_QA_ZERVO }}@${{ secrets.SSH_HOST_QA_ZERVO }} << 'EOF'
            echo "Waiting for containers to start..."
            sleep 10

            if docker ps | grep -q ${{ env.API_CONTAINER_NAME }}; then
              echo "API container is running"
              docker logs --tail 30 ${{ env.API_CONTAINER_NAME }}
            else
              echo "API container is not running"
              docker ps -a | grep ${{ env.API_CONTAINER_NAME }} || true
              exit 1
            fi

            if docker ps | grep -q ${{ env.WEB_CONTAINER_NAME }}; then
              echo "Web container is running"
              docker logs --tail 30 ${{ env.WEB_CONTAINER_NAME }}
            else
              echo "Web container is not running"
              docker ps -a | grep ${{ env.WEB_CONTAINER_NAME }} || true
              exit 1
            fi
          EOF
